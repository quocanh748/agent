<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinestar AI Agent</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: white; }
        #chat-container { max-width: 600px; margin: 0 auto; background: #2a2a2a; padding: 20px; border-radius: 8px; }
        #messages { height: 400px; overflow-y: auto; border-bottom: 1px solid #444; margin-bottom: 10px; padding-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 4px; }
        .user { background: #0056b3; text-align: right; }
        .ai { background: #333; }
        #input-container { display: flex; }
        #input-container input { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; }
        #input-container button { padding: 10px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 5px; }
        img { max-width: 200px; display: block; margin-top: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="chat-container">
        <h2>Cinestar AI Booking Agent (LangGraph)</h2>
        <div id="messages"></div>
        <div id="input-container">
            <input type="text" id="userInput" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Gửi</button>
        </div>
    </div>

    <script>
        const sessionId = "session_" + Math.random().toString(36).substr(2, 9);
        const messagesDiv = document.getElementById('messages');

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            
            // Hỗ trợ hiển thị ảnh từ markdown ![alt](url)
            let formattedText = text.replace(/!\[.*?\]\((.*?)\)/g, '<img src="$1" />');
            // Thay thế xuống dòng thành <br>
            formattedText = formattedText.replace(/\n/g, '<br>');
            
            div.innerHTML = formattedText;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: sessionId })
                });
                const data = await response.json();
                appendMessage(data.response, 'ai');
            } catch (error) {
                appendMessage('Lỗi khi gửi tin nhắn.', 'ai');
            }
        }
    </script>
</body>
</html>
